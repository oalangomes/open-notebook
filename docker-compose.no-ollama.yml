# Docker Compose without Ollama
# Use this for cloud AI providers (OpenAI, Anthropic, Google, etc)
#
# Usage:
#   1. Configure API keys: export OPENAI_API_KEY=... (or other provider)
#   2. Run: docker compose -f docker-compose.no-ollama.yml up -d
#   3. Access: http://localhost:3000 (frontend) and http://localhost:5055 (API)

services:
  surrealdb:
    image: surrealdb/surrealdb:v2
    command: start --log info --user root --pass root rocksdb:/mydata/mydatabase.db
    user: root
    ports:
      - "8000:8000"
    volumes:
      - ./surreal_data:/mydata
    environment:
      - SURREAL_EXPERIMENTAL_GRAPHQL=true
    restart: always
    pull_policy: always

  open_notebook:
    build:
      context: .
      dockerfile: Dockerfile
    image: open-notebook-local:dev
    ports:
      - "5055:5055"
    environment:
      # REQUIRED: Change this to your own secret string
      - OPEN_NOTEBOOK_ENCRYPTION_KEY=local-dev-key-please-change

      # Database connection
      - SURREAL_URL=ws://surrealdb:8000/rpc
      - SURREAL_USER=root
      - SURREAL_PASSWORD=root
      - SURREAL_NAMESPACE=open_notebook
      - SURREAL_DATABASE=open_notebook

      # AI Provider configuration (configure via Settings UI or env vars)
      # Example: OpenAI
      # - OPENAI_API_KEY=sk-...
      # Example: Anthropic
      # - ANTHROPIC_API_KEY=sk-ant-...

    volumes:
      - ./notebook_data:/app/data
    depends_on:
      - surrealdb
    restart: always
    pull_policy: always
